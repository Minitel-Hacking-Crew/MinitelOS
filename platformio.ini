[env:MinitelOS]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
	symlink://../Minitel1B_Hard
	ewpa/LibSSH-ESP32
	marian-craciunescu/ESP32Ping
board_build.partitions = partitions.csv

[env:native]
platform = native
build_flags =
    -std=c++17
    -I sim/include
    -D NATIVE_SIM
    -D LITTLEFS_SIM_ROOT='"sim_fs"'
    -lcurl
build_src_filter = +<**/*.cpp> -<main.cpp>
lib_ldf_mode = deep+